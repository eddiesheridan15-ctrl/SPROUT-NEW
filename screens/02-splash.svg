<svg viewBox="0 0 520 1040" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#43cf74"/>
      <stop offset="50%" stop-color="#27a85a"/>
      <stop offset="100%" stop-color="#157a3f"/>
    </linearGradient>
    <linearGradient id="sprout" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ec46d"/>
      <stop offset="100%" stop-color="#1f9d52"/>
    </linearGradient>
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowBlur" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="iconLift" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="deviceShadow" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="22" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <clipPath id="screenClip"><rect x="65" y="76" width="390" height="847" rx="42"/></clipPath>
  </defs>

  <rect width="520" height="1040" fill="none"/>

  <rect x="51" y="62" width="418" height="875" rx="62" fill="#1c1c1e" filter="url(#deviceShadow)"/>
  <rect x="54" y="65" width="412" height="869" rx="59" fill="none" stroke="#3a3a3c" stroke-width="2"/>
  <rect x="61" y="72" width="398" height="855" rx="48" fill="#000000"/>

  <g clip-path="url(#screenClip)">
    <g transform="translate(65,76)">
      <rect width="390" height="847" fill="url(#bg)"/>

      <text x="32" y="50" fill="#ffffff" font-size="16" font-weight="600">16:25</text>
      <g transform="translate(302,38)" fill="#ffffff">
        <rect x="0" y="8" width="3" height="5" rx="1"/>
        <rect x="5" y="5" width="3" height="8" rx="1"/>
        <rect x="10" y="2" width="3" height="11" rx="1"/>
        <rect x="15" y="0" width="3" height="13" rx="1" opacity="0.45"/>
      </g>
      <path d="M328 42 a14 14 0 0 1 20 0 M332 46 a8 8 0 0 1 12 0" stroke="#ffffff" stroke-width="1.6" fill="none"/>
      <circle cx="338" cy="50" r="1.8" fill="#ffffff"/>
      <rect x="354" y="38" width="24" height="12" rx="3" fill="none" stroke="#ffffff" stroke-opacity="0.6"/>
      <rect x="356" y="40" width="18" height="8" rx="1.5" fill="#ffffff"/>
      <rect x="379" y="41.5" width="2" height="5" rx="1" fill="#ffffff" opacity="0.7"/>

      <rect x="143" y="22" width="104" height="30" rx="15" fill="#000000"/>

      <circle cx="195" cy="395" r="175" fill="url(#logoGlow)" filter="url(#glowBlur)"/>
      <circle cx="195" cy="395" r="110" fill="url(#logoGlow)" opacity="0.85"/>
      <circle cx="195" cy="395" r="70" fill="url(#logoGlow)" opacity="0.6"/>

      <g transform="translate(195,395) scale(1.9) translate(-29,-29)" filter="url(#iconLift)">
        <rect width="58" height="58" rx="15" fill="#ffffff"/>
        <rect width="58" height="58" rx="15" fill="#eafff2" opacity="0.5"/>
        <path d="M29 45 C29 34 23 29 17 27 C25 26 31 31 31 41 Z" fill="#27a85a" opacity="0.35"/>
        <path d="M31 41 C31 31 37 26 45 25 C41 33 38 38 31 42 Z" fill="#27a85a" opacity="0.35"/>
        <text x="29" y="41" fill="url(#sprout)" font-size="36" font-weight="800" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">S</text>
      </g>

      <text x="195" y="545" fill="#ffffff" font-size="34" font-weight="700" letter-spacing="2" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">Sprout</text>

      <text x="195" y="780" fill="#ffffff" font-size="13" font-weight="500" text-anchor="middle" letter-spacing="0.4" opacity="0.85">Saving the Planet</text>
      <text x="195" y="800" fill="#ffffff" font-size="13" font-weight="500" text-anchor="middle" letter-spacing="0.4" opacity="0.85">One Upload at a Time</text>

      <rect x="125" y="824" width="140" height="5" rx="2.5" fill="#ffffff" opacity="0.6"/>
    </g>
  </g>
</svg>
