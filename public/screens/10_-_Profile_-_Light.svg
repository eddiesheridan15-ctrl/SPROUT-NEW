        <text x="20" y="30" fill="#ffffff" font-size="18" font-weight="800">3 bags</text>
        <text x="20" y="48" fill="#9fd9b6" font-size="10">litter collected</text>
        <line x1="120" y1="16" x2="120" y2="48" stroke="#2f6e4a" stroke-width="1"/>
        <text x="140" y="30" fill="#ffffff" font-size="18" font-weight="800">86 km</text>
        <text x="140" y="48" fill="#9fd9b6" font-size="10">travelled green</text>
        <line x1="240" y1="16" x2="240" y2="48" stroke="#2f6e4a" stroke-width="1"/>
        <text x="260" y="30" fill="#ffffff" font-size="18" font-weight="800">22 acts</text>
        <text x="260" y="48" fill="#9fd9b6" font-size="10">this month</text>
