        <circle cx="24" cy="20" r="12" fill="#d3f0ff"/><path d="M24 13 c5 7 5 11 0 13 c-5 -2 -5 -6 0 -13z" fill="#2b8fd9"/>
        <text x="46" y="18" fill="#16331f" font-size="12" font-weight="600">Beach clean</text>
