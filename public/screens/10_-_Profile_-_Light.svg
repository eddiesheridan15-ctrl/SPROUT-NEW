        <line x1="-4.5" y1="0" x2="4.5" y2="0" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="0" y1="-4.5" x2="0" y2="4.5" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
      </g>
