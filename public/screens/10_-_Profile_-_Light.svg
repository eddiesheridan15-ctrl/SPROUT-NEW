            <rect x="-1.6" y="-11" width="3.2" height="4.4" rx="1"/>
          </g>
          <use href="#cogteeth" transform="rotate(45)"/>
          <use href="#cogteeth" transform="rotate(90)"/>
          <use href="#cogteeth" transform="rotate(135)"/>
          <use href="#cogteeth" transform="rotate(180)"/>
          <use href="#cogteeth" transform="rotate(225)"/>
          <use href="#cogteeth" transform="rotate(270)"/>
          <use href="#cogteeth" transform="rotate(315)"/>
