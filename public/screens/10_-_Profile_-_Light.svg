        <text x="338" y="20" fill="#1f9d52" font-size="12" font-weight="800" text-anchor="end">+50</text>
        <text x="338" y="34" fill="#9aa89d" font-size="9" text-anchor="end">&#128205; Brighton</text>

        <rect y="48" width="350" height="40" rx="13" fill="#ffffff" stroke="#eef2ee"/>
        <circle cx="24" cy="68" r="12" fill="#e7f4ea"/><path d="M24 60 l5 9 h-10 z M24 64 l5 9 h-10 z" fill="#2f9e54"/><rect x="23" y="71" width="2" height="4" fill="#7a5a3a"/>
        <text x="46" y="66" fill="#16331f" font-size="12" font-weight="600">Nature walk + litter pick</text>
        <text x="46" y="80" fill="#7a8a7e" font-size="10">Yesterday</text>
        <text x="338" y="68" fill="#1f9d52" font-size="12" font-weight="800" text-anchor="end">+40</text>
        <text x="338" y="82" fill="#9aa89d" font-size="9" text-anchor="end">&#128205; Lake District</text>
      </g>

