            <ellipse cx="0" cy="-5.5" rx="2.8" ry="4.6" transform="rotate(72)"/>
            <ellipse cx="0" cy="-5.5" rx="2.8" ry="4.6" transform="rotate(144)"/>
            <ellipse cx="0" cy="-5.5" rx="2.8" ry="4.6" transform="rotate(216)"/>
