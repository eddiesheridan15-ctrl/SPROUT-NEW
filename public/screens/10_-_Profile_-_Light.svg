        <g transform="translate(222,0)"><use href="#shieldBadge" transform="translate(28,28)"/><g transform="translate(28,28) scale(0.92)"><path d="M0 -12 c10 14 10 22 0 26 c-10 -4 -10 -12 0 -26z" fill="#2b8fd9"/></g></g>
