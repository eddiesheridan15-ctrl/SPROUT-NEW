<svg viewBox="0 0 520 1040" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="sprout" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ec46d"/><stop offset="100%" stop-color="#1f9d52"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2bb45f"/><stop offset="100%" stop-color="#0f5e30"/>
    </linearGradient>
    <linearGradient id="headerFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f9d52"/><stop offset="100%" stop-color="#f4f7f4"/>
    </linearGradient>
    <linearGradient id="heroFadeA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2bb45f"/>
      <stop offset="55%" stop-color="#1f9d52"/>
      <stop offset="78%" stop-color="#7fc99b"/>
      <stop offset="100%" stop-color="#f4f7f4"/>
    </linearGradient>
    <radialGradient id="tabGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="avatarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="deviceShadow" x="-50%" y="-40%" width="200%" height="190%">
      <feDropShadow dx="0" dy="8" stdDeviation="22" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <filter id="camShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0c5a2e" flood-opacity="0.5"/>
    </filter>
    <clipPath id="screenClip"><rect x="65" y="76" width="390" height="847" rx="42"/></clipPath>
    <path id="shieldBadge" d="M0 -24 L20 -16 V -2 C20 12 11 21 0 25 C-11 21 -20 12 -20 -2 V -16 Z" fill="none" stroke="#1f9d52" stroke-width="2.2" stroke-linejoin="round"/>
  </defs>

  <rect x="51" y="62" width="418" height="875" rx="62" fill="#1c1c1e" filter="url(#deviceShadow)"/>
  <rect x="54" y="65" width="412" height="869" rx="59" fill="none" stroke="#3a3a3c" stroke-width="2"/>
  <rect x="61" y="72" width="398" height="855" rx="48" fill="#000000"/>

  <g clip-path="url(#screenClip)">
    <g transform="translate(65,76)">
      <rect width="390" height="847" fill="#f4f7f4"/>

      <!-- Green fading gradient header (stays green behind avatar/name, fades into page) -->
      <rect width="390" height="300" fill="url(#heroFadeA)"/>
      <!-- leaf motif -->
      <path d="M330 40 C355 70 356 110 344 150 C328 110 322 72 330 40z" fill="#ffffff" opacity="0.06"/>

      <!-- Status bar -->
      <text x="32" y="50" fill="#ffffff" font-size="16" font-weight="600">16:35</text>
      <g transform="translate(302,38)" fill="#ffffff">
        <rect x="0" y="8" width="3" height="5" rx="1"/><rect x="5" y="5" width="3" height="8" rx="1"/>
        <rect x="10" y="2" width="3" height="11" rx="1"/><rect x="15" y="0" width="3" height="13" rx="1"/>
      </g>
      <path d="M328 42 a14 14 0 0 1 20 0 M332 46 a8 8 0 0 1 12 0" stroke="#ffffff" stroke-width="1.6" fill="none"/>
