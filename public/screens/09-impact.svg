<svg viewBox="0 0 520 1040" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="sprout" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ec46d"/>
      <stop offset="100%" stop-color="#1f9d52"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2bb45f"/>
      <stop offset="100%" stop-color="#0f5e30"/>
    </linearGradient>
    <linearGradient id="headerFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#178043"/>
      <stop offset="20%" stop-color="#1f9d52"/>
      <stop offset="100%" stop-color="#f4f7f4"/>
    </linearGradient>
    <radialGradient id="tabGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="deviceShadow" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1a1a1a" flood-opacity="0.32"/>
    </filter>
    <filter id="camShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0c5a2e" flood-opacity="0.5"/>
    </filter>
    <clipPath id="screenClip"><rect x="65" y="76" width="390" height="847" rx="42"/></clipPath>
  </defs>

  <rect x="51" y="62" width="418" height="875" rx="62" fill="#1c1c1e" filter="url(#deviceShadow)"/>
  <rect x="54" y="65" width="412" height="869" rx="59" fill="none" stroke="#3a3a3c" stroke-width="2"/>
  <rect x="61" y="72" width="398" height="855" rx="48" fill="#000000"/>

  <g clip-path="url(#screenClip)">
    <g transform="translate(65,76)">
      <rect width="390" height="847" fill="#f4f7f4"/>

      <!-- Green fading gradient header (matches feed/learn/ranks) -->
      <rect y="0" width="390" height="230" fill="url(#headerFade)"/>

      <!-- Status bar (white) -->
      <text x="32" y="50" fill="#ffffff" font-size="16" font-weight="600">16:33</text>
      <g transform="translate(302,38)" fill="#ffffff">
        <rect x="0" y="8" width="3" height="5" rx="1"/><rect x="5" y="5" width="3" height="8" rx="1"/>
        <rect x="10" y="2" width="3" height="11" rx="1"/><rect x="15" y="0" width="3" height="13" rx="1"/>
      </g>
      <path d="M328 42 a14 14 0 0 1 20 0 M332 46 a8 8 0 0 1 12 0" stroke="#ffffff" stroke-width="1.6" fill="none"/>
      <circle cx="338" cy="50" r="1.8" fill="#ffffff"/>
      <rect x="354" y="38" width="24" height="12" rx="3" fill="none" stroke="#ffffff" stroke-opacity="0.7"/>
      <rect x="356" y="40" width="18" height="8" rx="1.5" fill="#ffffff"/>
      <rect x="143" y="22" width="104" height="30" rx="15" fill="#000000"/>

      <!-- App icon corner mark -->
      <g transform="translate(20,72)"><rect width="30" height="30" rx="8" fill="#ffffff"/><text x="15" y="22" fill="#1f9d52" font-size="19" font-weight="800" text-anchor="middle" font-family="Georgia, serif">S</text></g>
      <!-- Title -->
      <text x="58" y="93" fill="#ffffff" font-size="20" font-weight="700" font-family="Georgia, serif">Ranks</text>

      <!-- Team / Leaderboard / Impact toggle (Impact active) -->
      <g transform="translate(20,116)">
        <rect width="350" height="40" rx="20" fill="#e6ece7"/>
        <rect x="233" y="3" width="114" height="34" rx="17" fill="url(#sprout)"/>
        <text x="60" y="25" fill="#7a8a7e" font-size="12" font-weight="600" text-anchor="middle">My Team</text>
        <text x="175" y="25" fill="#7a8a7e" font-size="12" font-weight="600" text-anchor="middle">Leaderboard</text>
        <text x="290" y="25" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">Impact</text>
      </g>

      <!-- ===== UP FOR GRABS HERO CARD (pledge state) ===== -->
      <rect x="20" y="176" width="350" height="182" rx="22" fill="url(#hero)" filter="url(#camShadow)"/>
      <text x="40" y="204" fill="#a8d9bd" font-size="10" font-weight="700" letter-spacing="1.2">GREENCO &#183; SUMMER PROGRAMME</text>
      <text x="40" y="230" fill="#ffffff" font-size="22" font-weight="800">Up for grabs</text>
      <text x="40" y="250" fill="#a8d9bd" font-size="10.5" font-weight="600">Your team picks one. The winners decide which becomes real.</text>

      <!-- prize row 1: trees -->
      <g transform="translate(40,264)">
        <circle cx="13" cy="13" r="13" fill="#ffffff" opacity="0.18"/>
        <g transform="translate(13,13)"><path d="M0 -7 l5 9 h-10 z M0 -3 l5 9 h-10 z" fill="#ffffff"/></g>
        <text x="36" y="18" fill="#ffffff" font-size="14" font-weight="700">9,500 trees planted</text>
      </g>
      <!-- prize row 2: water -->
      <g transform="translate(40,296)">
        <circle cx="13" cy="13" r="13" fill="#ffffff" opacity="0.18"/>
        <path d="M13 5 c5.5 7.5 5.5 12 0 14 c-5.5 -2 -5.5 -6.5 0 -14z" fill="#ffffff"/>
        <text x="36" y="18" fill="#ffffff" font-size="14" font-weight="700">13 tonnes of plastic cleared</text>
      </g>
      <!-- prize row 3: wildlife -->
      <g transform="translate(40,328)">
        <circle cx="13" cy="13" r="13" fill="#ffffff" opacity="0.18"/>
        <g transform="translate(13,14)" fill="#ffffff">
          <ellipse cx="0" cy="2.5" rx="4" ry="3.4"/>
          <circle cx="-4.6" cy="-2.2" r="1.7"/><circle cx="0" cy="-3.6" r="1.7"/><circle cx="4.6" cy="-2.2" r="1.7"/>
        </g>
        <text x="36" y="18" fill="#ffffff" font-size="14" font-weight="700">835 snares removed</text>
      </g>


      <!-- ===== GLOBAL SECTION ===== -->
      <text x="24" y="398" fill="#16331f" font-size="13" font-weight="700">Across all of Sprout</text>
      <text x="24" y="412" fill="#7a8a7e" font-size="10.5">Every number comes from partner reporting</text>

      <!-- LAND / TREE PLANTERS -->
      <g transform="translate(20,424)">
        <rect width="350" height="88" rx="16" fill="#ffffff" stroke="#e8ede8"/>
        <circle cx="42" cy="44" r="22" fill="#e7f4ea"/>
        <path d="M42 32 l10 18 h-20 z M42 40 l10 18 h-20 z" fill="#2f9e54"/>
        <rect x="40" y="56" width="4" height="9" fill="#7a5a3a"/>
        <text x="76" y="34" fill="#16331f" font-size="13" font-weight="700">Tree Planters</text>
        <text x="76" y="50" fill="#7a8a7e" font-size="10.5">Land  &#183;  Reforestation</text>
        <text x="76" y="70" fill="#9aa89d" font-size="9.5" font-weight="600">Reported May 2026</text>
        <text x="316" y="42" fill="#1f9d52" font-size="18" font-weight="800" text-anchor="end">248,000</text>
        <text x="316" y="58" fill="#7a8a7e" font-size="9.5" text-anchor="end">trees planted</text>
        <path d="M332 38 l6 6 l-6 6" stroke="#9aa89d" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <!-- WATER / RIVER RESCUERS -->
      <g transform="translate(20,524)">
        <rect width="350" height="88" rx="16" fill="#ffffff" stroke="#e8ede8"/>
        <circle cx="42" cy="44" r="22" fill="#dff1fb"/>
        <path d="M42 30 c10 14 10 22 0 26 c-10 -4 -10 -12 0 -26z" fill="#2b8fd9"/>
        <text x="76" y="34" fill="#16331f" font-size="13" font-weight="700">River Rescuers</text>
        <text x="76" y="50" fill="#7a8a7e" font-size="10.5">Water  &#183;  Clean oceans</text>
        <text x="76" y="70" fill="#9aa89d" font-size="9.5" font-weight="600">Reported May 2026</text>
        <text x="316" y="42" fill="#1f9d52" font-size="18" font-weight="800" text-anchor="end">18 tonnes</text>
        <text x="316" y="58" fill="#7a8a7e" font-size="9.5" text-anchor="end">plastic removed</text>
        <path d="M332 38 l6 6 l-6 6" stroke="#9aa89d" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <!-- WILDLIFE / WILDLIFE WATCHERS -->
      <g transform="translate(20,624)">
        <rect width="350" height="88" rx="16" fill="#ffffff" stroke="#e8ede8"/>
        <circle cx="42" cy="44" r="22" fill="#fdeede"/>
        <g transform="translate(42,45)">
          <path d="M-9 -6 Q-11 -12 -7 -12 Q-6 -9 -4 -8 Z" fill="#e89a3c"/>
          <path d="M9 -6 Q11 -12 7 -12 Q6 -9 4 -8 Z" fill="#e89a3c"/>
          <ellipse cx="0" cy="0" rx="10" ry="9" fill="#f0a94e"/>
          <path d="M0 2 Q-7 4 -9 9 Q-4 8 0 6 Q4 8 9 9 Q7 4 0 2 Z" fill="#fff2e0"/>
          <circle cx="-4" cy="-2" r="1.7" fill="#3a2a1a"/>
          <circle cx="4" cy="-2" r="1.7" fill="#3a2a1a"/>
          <path d="M-2 3 Q0 5 2 3" fill="none" stroke="#3a2a1a" stroke-width="1.1" stroke-linecap="round"/>
          <path d="M0 1.5 L-1.4 3 H1.4 Z" fill="#3a2a1a"/>
          <path d="M-4 0 L-6 7" stroke="#7a4a1a" stroke-width="1.1" fill="none" stroke-linecap="round"/>
          <path d="M4 0 L6 7" stroke="#7a4a1a" stroke-width="1.1" fill="none" stroke-linecap="round"/>
          <circle cx="-7" cy="-4" r="1" fill="#7a4a1a"/>
          <circle cx="7" cy="-4" r="1" fill="#7a4a1a"/>
          <circle cx="-8" cy="1" r="1" fill="#7a4a1a"/>
          <circle cx="8" cy="1" r="1" fill="#7a4a1a"/>
        </g>
        <text x="76" y="34" fill="#16331f" font-size="13" font-weight="700">Wildlife Watchers</text>
        <text x="76" y="50" fill="#7a8a7e" font-size="10.5">Wildlife  &#183;  Conservation</text>
        <text x="76" y="70" fill="#9aa89d" font-size="9.5" font-weight="600">Reported Apr 2026</text>
        <text x="316" y="42" fill="#1f9d52" font-size="18" font-weight="800" text-anchor="end">312</text>
        <text x="316" y="58" fill="#7a8a7e" font-size="9.5" text-anchor="end">snares removed</text>
        <path d="M332 38 l6 6 l-6 6" stroke="#9aa89d" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <!-- ===== BOTTOM TAB BAR (Ranks active) ===== -->
      <g transform="translate(0,759)">
        <rect width="390" height="88" fill="#ffffff"/>
        <line x1="0" y1="0" x2="390" y2="0" stroke="#e3e9e3" stroke-width="1"/>

        <!-- Feed -->
        <g transform="translate(33,22)">
          <rect x="0" y="0" width="22" height="22" rx="4" fill="none" stroke="#9aa89d" stroke-width="2.2"/>
          <line x1="4" y1="7" x2="18" y2="7" stroke="#9aa89d" stroke-width="2.2"/>
          <line x1="4" y1="12" x2="18" y2="12" stroke="#9aa89d" stroke-width="2.2"/>
          <line x1="4" y1="17" x2="13" y2="17" stroke="#9aa89d" stroke-width="2.2"/>
        </g>
        <text x="44" y="62" fill="#9aa89d" font-size="10" font-weight="600" text-anchor="middle">Feed</text>

        <!-- Learn -->
        <g transform="translate(112,23)" stroke="#9aa89d" stroke-width="2" fill="none"><path d="M2 4 h9 a3 3 0 0 1 3 3 v15 a3 3 0 0 0 -3 -2 h-9 z"/><path d="M24 4 h-9 a3 3 0 0 0 -3 3 v15 a3 3 0 0 1 3 -2 h9 z"/></g>
        <text x="124" y="62" fill="#9aa89d" font-size="10" font-weight="600" text-anchor="middle">Learn</text>

        <!-- Camera -->
        <circle cx="195" cy="28" r="30" fill="url(#sprout)" filter="url(#camShadow)"/>
        <circle cx="195" cy="28" r="30" fill="#ffffff" opacity="0.08"/>
        <g transform="translate(195,28)" stroke="#ffffff" stroke-width="2.4" fill="none">
          <rect x="-13" y="-9" width="26" height="19" rx="5"/>
          <circle cx="0" cy="1" r="6"/>
          <rect x="-6" y="-13" width="9" height="5" rx="2" fill="#ffffff" stroke="none"/>
        </g>

        <!-- Ranks (ACTIVE) -->
        <circle cx="271" cy="34" r="26" fill="url(#tabGlow)"/>
        <g transform="translate(258,22)" stroke="#1f9d52" stroke-width="2.2" fill="none">
          <rect x="0" y="12" width="7" height="12" rx="1.5"/>
          <rect x="9" y="4" width="7" height="20" rx="1.5"/>
          <rect x="18" y="16" width="7" height="8" rx="1.5"/>
        </g>
        <text x="271" y="62" fill="#1f9d52" font-size="10" font-weight="700" text-anchor="middle">Ranks</text>

        <!-- Profile -->
        <g transform="translate(338,22)" stroke="#9aa89d" stroke-width="2" fill="none">
          <circle cx="11" cy="8" r="6"/>
          <path d="M0 24 a11 11 0 0 1 22 0"/>
        </g>
        <text x="349" y="62" fill="#9aa89d" font-size="10" font-weight="600" text-anchor="middle">Profile</text>
      </g>

      <rect x="125" y="833" width="140" height="5" rx="2.5" fill="#16331f" opacity="0.35"/>
    </g>
  </g>
</svg>
