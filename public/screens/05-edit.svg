<svg viewBox="0 0 520 1040" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="sprout" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ec46d"/>
      <stop offset="100%" stop-color="#1f9d52"/>
    </linearGradient>
    <filter id="deviceShadow" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="22" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <filter id="thumbShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0c2a18" flood-opacity="0.3"/>
    </filter>
    <clipPath id="screenClip"><rect x="65" y="76" width="390" height="847" rx="42"/></clipPath>
    <clipPath id="thumbClip"><rect x="153" y="138" width="84" height="84" rx="16"/></clipPath>
  </defs>

  <rect width="520" height="1040" fill="#f7f6f1"/>
  <rect x="51" y="62" width="418" height="875" rx="62" fill="#1c1c1e" filter="url(#deviceShadow)"/>
  <rect x="54" y="65" width="412" height="869" rx="59" fill="none" stroke="#3a3a3c" stroke-width="2"/>
  <rect x="61" y="72" width="398" height="855" rx="48" fill="#000000"/>

  <g clip-path="url(#screenClip)">
    <g transform="translate(65,76)">
      <rect width="390" height="847" fill="#f4f7f4"/>

      <!-- Status bar (dark) -->
      <text x="32" y="50" fill="#0d1f14" font-size="16" font-weight="600">16:28</text>
      <g transform="translate(302,38)" fill="#0d1f14">
        <rect x="0" y="8" width="3" height="5" rx="1"/><rect x="5" y="5" width="3" height="8" rx="1"/>
        <rect x="10" y="2" width="3" height="11" rx="1"/><rect x="15" y="0" width="3" height="13" rx="1"/>
      </g>
      <path d="M328 42 a14 14 0 0 1 20 0 M332 46 a8 8 0 0 1 12 0" stroke="#0d1f14" stroke-width="1.6" fill="none"/>
      <circle cx="338" cy="50" r="1.8" fill="#0d1f14"/>
      <rect x="354" y="38" width="24" height="12" rx="3" fill="none" stroke="#0d1f14" stroke-opacity="0.6"/>
      <rect x="356" y="40" width="18" height="8" rx="1.5" fill="#0d1f14"/>
      <rect x="143" y="22" width="104" height="30" rx="15" fill="#000000"/>

      <!-- Nav: back + title + Share -->
      <text x="20" y="108" fill="#16331f" font-size="30" font-weight="700">&#8249;</text>
      <text x="195" y="103" fill="#16331f" font-size="16" font-weight="700" text-anchor="middle">New Post</text>
      <g transform="translate(312,86)">
        <rect width="62" height="30" rx="15" fill="url(#sprout)"/>
        <text x="31" y="20" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">Share</text>
      </g>

      <!-- Captured photo: small square, top center -->
      <rect x="151" y="136" width="88" height="88" rx="18" fill="#ffffff" filter="url(#thumbShadow)"/>
      <g clip-path="url(#thumbClip)">
        <image x="153" y="138" width="84" height="84" preserveAspectRatio="xMidYMid slice" xlink:href="data:image/jpeg;base64,"/>
      </g>
      <text x="195" y="244" fill="#7a8a7e" font-size="11" text-anchor="middle">Tap to edit</text>

      <!-- Caption box -->
      <text x="24" y="278" fill="#16331f" font-size="12" font-weight="700">CAPTION</text>
      <rect x="20" y="288" width="350" height="78" rx="14" fill="#ffffff" stroke="#e3e9e3" stroke-width="1"/>
      <text x="34" y="312" fill="#9aa89d" font-size="13">Tell your team what you did and why...</text>
      <text x="356" y="358" fill="#b7c2ba" font-size="10" text-anchor="end">0 / 280</text>

      <!-- Reflection field (replaces pillar) -->
      <text x="24" y="396" fill="#16331f" font-size="12" font-weight="700">A MOMENT TO REFLECT</text>
      <text x="356" y="396" fill="#9aa89d" font-size="10.5" text-anchor="end">Only you will see this</text>
      <rect x="20" y="406" width="350" height="72" rx="14" fill="#ffffff" stroke="#e3e9e3" stroke-width="1"/>
      <!-- little leaf/heart accent -->
      <g transform="translate(34,424)">
        <path d="M0 6 C0 -2 8 -2 8 4 C8 -2 16 -2 16 6 C16 12 8 16 8 16 C8 16 0 12 0 6z" fill="#cfeede"/>
        <path d="M8 16 C8 8 4 5 0 4 C5 3 10 7 10 14 Z" fill="#3ec46d" opacity="0.0"/>
      </g>
      <text x="60" y="430" fill="#9aa89d" font-size="12.5">What did this moment mean to you?</text>
      <text x="60" y="450" fill="#c2cdc6" font-size="11.5">e.g. felt good to leave the trail better than</text>
      <text x="60" y="466" fill="#c2cdc6" font-size="11.5">I found it...</text>

      <!-- Activity dropdown -->
      <text x="24" y="500" fill="#16331f" font-size="12" font-weight="700">ACTIVITY</text>
      <rect x="20" y="510" width="350" height="48" rx="14" fill="#ffffff" stroke="#e3e9e3" stroke-width="1"/>
      <circle cx="44" cy="534" r="12" fill="#e6f6ec"/>
      <path d="M40 534 l3 3 6 -7" stroke="#1f9d52" stroke-width="2" fill="none"/>
      <text x="66" y="539" fill="#16331f" font-size="13" font-weight="600">Nature walk + litter pick</text>
      <path d="M348 530 l6 7 6 -7" stroke="#9aa89d" stroke-width="2" fill="none"/>

      <!-- Location toggle row -->
      <text x="24" y="592" fill="#16331f" font-size="12" font-weight="700">DETAILS</text>
      <rect x="20" y="602" width="350" height="48" rx="14" fill="#ffffff" stroke="#e3e9e3" stroke-width="1"/>
      <path d="M36 614 c8 0 12 6 12 11 c0 7 -12 17 -12 17 c0 0 -12 -10 -12 -17 c0 -5 4 -11 12 -11z" fill="none" stroke="#5d6b61" stroke-width="1.6"/>
      <circle cx="36" cy="625" r="3.5" fill="#5d6b61"/>
      <text x="60" y="631" fill="#16331f" font-size="13" font-weight="600">Add location</text>
      <text x="356" y="631" fill="#9aa89d" font-size="13" text-anchor="end">Lake District &#8250;</text>

      <!-- Tag teammates row -->
      <rect x="20" y="660" width="350" height="48" rx="14" fill="#ffffff" stroke="#e3e9e3" stroke-width="1"/>
      <g transform="translate(28,672)" stroke="#5d6b61" stroke-width="1.6" fill="none">
        <circle cx="6" cy="5" r="4"/><circle cx="16" cy="5" r="4"/>
        <path d="M0 17 a6 6 0 0 1 12 0 M10 17 a6 6 0 0 1 12 0"/>
      </g>
      <text x="60" y="689" fill="#16331f" font-size="13" font-weight="600">Tag teammates</text>
      <g transform="translate(350,684)" stroke="#1f9d52" stroke-width="2.2" stroke-linecap="round"><line x1="-7" y1="0" x2="7" y2="0"/><line x1="0" y1="-7" x2="0" y2="7"/></g>

      <!-- Estimated points callout -->
      <rect x="20" y="722" width="350" height="56" rx="16" fill="#0f3d24"/>
      <circle cx="50" cy="750" r="16" fill="url(#sprout)"/>
      <text x="50" y="756" fill="#ffffff" font-size="16" font-weight="800" text-anchor="middle" font-family="Georgia, serif">S</text>
      <text x="80" y="745" fill="#ffffff" font-size="13" font-weight="700">You'll earn +50 points</text>
      <text x="80" y="763" fill="#9fd9b6" font-size="11">Counts toward your team's monthly total</text>

      <!-- Home indicator -->
      <rect x="125" y="824" width="140" height="5" rx="2.5" fill="#16331f" opacity="0.35"/>
    </g>
  </g>
</svg>